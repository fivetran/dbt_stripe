schema_variable_name: "stripe_schema"

include_databricks_sql: false
include_sqlserver: false
include_dbt_compile: true

test_scenarios:
  - name: "Default"
    vars: {}
    include_incremental: false

  - name: "features disabled"
    vars:
      stripe__using_payouts: false
      stripe__using_transfers: false
      stripe__using_invoices: false
      stripe__using_payment_method: false
      stripe__using_subscriptions: false
      stripe__using_coupons: false
      stripe__using_subscription_discounts: false
      stripe_timezone: "America/New_York"
      stripe__using_subscription_history: false
      stripe__using_price: false
      stripe__convert_values: true
      stripe__using_credit_notes: true
      stripe__standardized_billing_model_enabled: false
    include_incremental: false

  - name: "standardized billing enabled"
    vars:
      stripe__using_payouts: false
      stripe__using_invoices: true
      stripe__using_payment_method: false
      stripe__using_subscriptions: false
      stripe_timezone: "America/New_York"
      stripe__using_subscription_history: false
      stripe__using_price: false
      stripe__convert_values: true
      stripe__using_credit_notes: true
      stripe__standardized_billing_model_enabled: true
    include_incremental: false